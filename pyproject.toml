[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "memory-decay"
version = "0.1.0"
description = "Research project modeling human-like memory decay with graph-based associations and LLM-driven auto-improvement"
requires-python = ">=3.10"
dependencies = [
    "networkx>=3.0",
    "sentence-transformers>=2.2",
    "numpy>=1.24",
    "openai>=1.0",
    "google-genai>=1.0",
    "matplotlib>=3.10.8",
    "dash>=4.0.0",
    "dash-ag-grid>=33.3.3",
    "pandas>=2.3.3",
    "fastapi>=0.115.0",
    "uvicorn>=0.34.0",
    "sqlite-vec>=0.1.7",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0",
    "httpx>=0.28.0",
]

[tool.setuptools.packages.find]
where = ["src"]
